name: CI checks
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Run ESLint
    runs-on: ubuntu-stepsecurity-x64

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: npm ci
      - run: npm run lint

  check-dist:
    name: Check Distribution
    runs-on: ubuntu-stepsecurity-x64
    env:
      BUNDLE_FILE: "dist/index.js"
      BUNDLE_COMMAND: "npm run bundle"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install
        run: npm ci

      - name: Verify Latest Bundle
        uses: redhat-actions/common/bundle-verifier@a7e9fd367034e38805280ad71d9cc35e2d9f6f9d # v1.2.0
        with:
          bundle_file: ${{ env.BUNDLE_FILE }}
          bundle_command: ${{ env.BUNDLE_COMMAND }}

  check-inputs-outputs:
    name: Check Input and Output enums
    runs-on: ubuntu-stepsecurity-x64
    env:
      IO_FILE: ./src/generated/inputs-outputs.ts
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: npm ci

      - name: Verify Input and Output enums
        uses: redhat-actions/common/action-io-generator@a7e9fd367034e38805280ad71d9cc35e2d9f6f9d # v1.2.0
        with:
          io_file: ${{ env.IO_FILE }}
