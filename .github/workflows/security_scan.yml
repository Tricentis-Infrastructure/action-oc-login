name: Vulnerability Scan with CRDA
on:
  # push:
  workflow_dispatch:
  # pull_request_target:
  #   types: [ assigned, opened, synchronize, reopened, labeled, edited ]
  # schedule:
  #   - cron: '0 0 * * *'  # every day at midnight

jobs:
  crda-scan:
    runs-on: ubuntu-stepsecurity-x64
    name: Scan project vulnerability with CRDA
    steps:

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install CRDA
        uses: redhat-actions/openshift-tools-installer@144527c7d98999f2652264c048c7a9bd103f8a82 # v1.13.1
        with:
          source: github
          github_pat: ${{ github.token }}
          crda: "latest"

      - name: CRDA Scan
        id: scan
        uses: redhat-actions/crda@6310ee94a6ac8f76b4152b7267c6cd7f1277052c # v1.3
        with:
          crda_key: ${{ secrets.CRDA_KEY }}
          fail_on: never
